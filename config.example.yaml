  base_url: https://api.openai.com/v1
  api_key: ''
  model: gpt-4o-mini
  timeout_seconds: 120
  max_retries: 3
  max_concurrency: 4
summary:
  language: zh
  chunk_max_tokens: 3000
  chunk_overlap_tokens: 200
  map_prompt: ''
  reduce_prompt: ''
paths:
  output_dir: ''
  cache_dir: ''
cache:
  keep_intermediate_audio: false
logging:
  level: INFO
