network:
  proxy: ''
  use_system_proxy: true
downloader:
  ytdlp_path: ''
  cookies_file: ''
  retries: 3
  socket_timeout: 30
audio:
  ffmpeg_path: ''
subtitle:
  prefer_langs:
  - zh-Hans
  - zh
  - en
  allow_auto: true
stt:
  model_size: small
  device: cpu
  compute_type: int8
  vad_filter: true
  language: ''
